<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>lumen-ui — gallery</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: #0c0e10;

      canvas {
        position: absolute;
        inset: 0;
        width: 100%;

    <link data-trunk rel="rust" data-wasm-opt="2" />

    <canvas id="lumen_canvas"></canvas>
  </body>
