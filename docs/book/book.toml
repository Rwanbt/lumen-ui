[book]
title = "lumen-ui"
description = "A token-driven, themeable design system for egui."
authors = ["Rwanbt"]
language = "en"
src = "src"

[output.html]
default-theme = "navy"
preferred-dark-theme = "navy"
git-repository-url = "https://github.com/Rwanbt/lumen-ui"
