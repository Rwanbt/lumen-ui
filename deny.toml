# cargo-deny — supply-chain governance.
# Run: cargo deny check
# CVEs (cargo audit equivalent), license policy, and duplicate-version bans.

[advisories]
version = 2
yanked = "deny"

[licenses]
version = 2
# Permissive-only policy, matching lumen-ui's own MIT OR Apache-2.0 dual license.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "MPL-2.0",
]
confidence-threshold = 0.9

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
