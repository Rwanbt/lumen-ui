name: Pages (mdBook)

# Manual trigger only. GitHub Pages requires the repository to be public (or Pages
# enabled on the plan). To publish the book:
#   1. Make the repo public (or enable Pages on a paid plan).
#   2. Settings → Pages → Build and deployment → Source: "GitHub Actions".
#   3. Run this workflow from the Actions tab.
# Keeping it dispatch-only means it never fails automatically while Pages is off.
on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Install mdbook
        run: |
          set -e
          mkdir -p "$HOME/.local/bin"
          curl -sSL https://github.com/rust-lang/mdBook/releases/download/v0.5.3/mdbook-v0.5.3-x86_64-unknown-linux-gnu.tar.gz \
            | tar -xz -C "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - run: mdbook build docs/book
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/book/book
      - id: deploy
        uses: actions/deploy-pages@v4
